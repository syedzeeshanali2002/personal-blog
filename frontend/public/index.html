<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Journal — Personal Blog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --paper: #faf8f3;
    --cream: #f2ede3;
    --amber: #c8832a;
    --amber-light: #e8a84a;
    --muted: #8a7e6d;
    --border: #e0d8c8;
    --red: #b94040;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--paper); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* ── Header ── */
  header {
    border-bottom: 2px solid var(--ink);
    padding: 0 2rem;
    position: sticky; top: 0; z-index: 100;
    background: var(--paper);
  }
  .header-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 0;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; font-weight: 900;
    text-decoration: none; color: var(--ink);
    letter-spacing: -0.02em;
  }
  .logo span { color: var(--amber); }
  nav { display: flex; gap: 2rem; align-items: center; }
  nav a { text-decoration: none; color: var(--muted); font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
  nav a:hover { color: var(--ink); }
  .btn-admin {
    background: var(--ink); color: var(--paper) !important;
    padding: 0.4rem 1rem; border-radius: 2px;
    transition: background 0.2s !important;
  }
  .btn-admin:hover { background: var(--amber) !important; color: var(--paper) !important; }

  /* ── Hero ── */
  .hero {
    background: var(--ink); color: var(--paper);
    padding: 5rem 2rem;
    text-align: center;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.03) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.03) 40px);
  }
  .hero-inner { position: relative; max-width: 700px; margin: 0 auto; }
  .hero-tag { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--amber); margin-bottom: 1.5rem; }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900; line-height: 1.1;
    margin-bottom: 1.5rem;
  }
  .hero p { color: rgba(250,248,243,0.7); font-size: 1.1rem; line-height: 1.7; }

  /* ── Layout ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

  /* ── Search + Filter ── */
  .controls {
    display: flex; gap: 1rem; align-items: center;
    padding: 2rem 0; flex-wrap: wrap;
  }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap input {
    width: 100%; padding: 0.7rem 1rem 0.7rem 2.5rem;
    border: 1.5px solid var(--border); border-radius: 2px;
    background: white; font-family: inherit; font-size: 0.9rem;
    color: var(--ink); outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--amber); }
  .search-wrap::before { content: '🔍'; position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); font-size: 0.8rem; }
  .tags-filter { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .tag-btn {
    border: 1.5px solid var(--border); background: none;
    padding: 0.4rem 0.8rem; border-radius: 2px; cursor: pointer;
    font-family: inherit; font-size: 0.8rem; color: var(--muted);
    transition: all 0.2s;
  }
  .tag-btn:hover, .tag-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* ── Article Grid ── */
  .articles-section { padding-bottom: 4rem; }
  .section-header {
    display: flex; align-items: baseline; gap: 1rem;
    border-top: 2px solid var(--ink); padding-top: 1rem; margin-bottom: 2rem;
  }
  .section-header h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
  .section-header .count { color: var(--muted); font-size: 0.85rem; }

  .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }

  .article-card {
    border: 1.5px solid var(--border); background: white;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .article-card:hover { transform: translateY(-3px); box-shadow: 6px 6px 0 var(--ink); }
  .card-cover {
    width: 100%; height: 180px; object-fit: cover;
    background: linear-gradient(135deg, var(--cream), var(--border));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--border);
  }
  .card-cover img { width: 100%; height: 100%; object-fit: cover; }
  .card-body { padding: 1.5rem; }
  .card-tags { display: flex; gap: 0.4rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
  .card-tag {
    font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--amber); font-weight: 500;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; font-weight: 700; line-height: 1.3;
    margin-bottom: 0.7rem; color: var(--ink);
  }
  .card-excerpt { font-size: 0.875rem; color: var(--muted); line-height: 1.6; margin-bottom: 1rem; }
  .card-meta { display: flex; justify-content: space-between; align-items: center; }
  .card-date { font-size: 0.75rem; color: var(--muted); }
  .card-views { font-size: 0.75rem; color: var(--muted); }
  .read-more {
    font-size: 0.8rem; font-weight: 500; color: var(--amber);
    text-decoration: none; letter-spacing: 0.05em;
  }
  .read-more:hover { text-decoration: underline; }

  /* ── Featured (first card) ── */
  .articles-grid .article-card:first-child {
    grid-column: span 2;
  }
  .articles-grid .article-card:first-child .card-cover {
    height: 260px;
  }
  .articles-grid .article-card:first-child .card-title { font-size: 1.8rem; }
  @media (max-width: 768px) {
    .articles-grid .article-card:first-child { grid-column: span 1; }
    nav a:not(.btn-admin) { display: none; }
  }

  /* ── Pagination ── */
  .pagination { display: flex; gap: 0.5rem; justify-content: center; padding: 2rem 0; }
  .page-btn {
    width: 36px; height: 36px; border: 1.5px solid var(--border);
    background: none; cursor: pointer; font-family: inherit; font-size: 0.9rem;
    color: var(--muted); transition: all 0.2s;
  }
  .page-btn:hover, .page-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* ── Empty State ── */
  .empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
  .empty .icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--ink); }

  /* ── Footer ── */
  footer {
    border-top: 2px solid var(--ink); padding: 2rem;
    background: var(--ink); color: var(--paper);
    text-align: center;
  }
  footer p { font-size: 0.85rem; color: rgba(250,248,243,0.5); }
  footer a { color: var(--amber); text-decoration: none; }

  /* ── Loading ── */
  .loading { text-align: center; padding: 4rem; color: var(--muted); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 1rem; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Animations ── */
  .article-card { animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">The<span>.</span>Journal</a>
    <nav>
      <a href="/">Home</a>
      <a href="#articles">Articles</a>
      <a href="/admin/login" class="btn-admin">Admin ↗</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="hero-inner">
    <p class="hero-tag">✦ Personal Blog</p>
    <h1>Ideas Worth Reading</h1>
    <p>A curated space for thoughts on technology, life, and the pursuit of knowledge.</p>
  </div>
</section>

<div class="container" id="articles">
  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search articles…" />
    </div>
    <div class="tags-filter" id="tagsFilter">
      <button class="tag-btn active" data-tag="">All</button>
    </div>
  </div>

  <section class="articles-section">
    <div class="section-header">
      <h2>Latest Articles</h2>
      <span class="count" id="articleCount"></span>
    </div>
    <div class="articles-grid" id="articlesGrid">
      <div class="loading"><div class="spinner"></div><br>Loading articles…</div>
    </div>
    <div class="pagination" id="pagination"></div>
  </section>
</div>

<footer>
  <p>Built with ♥ using Node.js &mdash; <a href="/admin/login">Manage Blog</a></p>
</footer>

<script>
  let currentPage = 1;
  let currentTag = '';
  let searchTimeout;

  async function fetchTags() {
    try {
      const res = await fetch('/api/articles/tags');
      const { tags } = await res.json();
      const container = document.getElementById('tagsFilter');
      tags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'tag-btn';
        btn.dataset.tag = tag;
        btn.textContent = '#' + tag;
        btn.onclick = () => setTag(tag, btn);
        container.appendChild(btn);
      });
    } catch {}
  }

  function setTag(tag, btn) {
    currentTag = tag;
    currentPage = 1;
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    fetchArticles();
  }

  async function fetchArticles() {
    const grid = document.getElementById('articlesGrid');
    const search = document.getElementById('searchInput').value;
    grid.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading…</div>';

    const params = new URLSearchParams({ page: currentPage, limit: 6 });
    if (currentTag) params.set('tag', currentTag);
    if (search) params.set('search', search);

    try {
      const res = await fetch(`/api/articles?${params}`);
      const { articles, total, totalPages } = await res.json();
      renderArticles(articles, total, totalPages);
    } catch {
      grid.innerHTML = '<div class="empty"><div class="icon">⚠️</div><h3>Failed to load articles</h3><p>Please try refreshing the page.</p></div>';
    }
  }

  function renderArticles(articles, total, totalPages) {
    const grid = document.getElementById('articlesGrid');
    document.getElementById('articleCount').textContent = `${total} article${total !== 1 ? 's' : ''}`;

    if (!articles.length) {
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="icon">📭</div><h3>No articles found</h3><p>Try a different search or tag.</p></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = articles.map((a, i) => `
      <div class="article-card" onclick="location.href='/article/${a.slug}'" style="animation-delay:${i * 0.06}s">
        <div class="card-cover">${a.coverImage ? `<img src="${a.coverImage}" alt="${a.title}" loading="lazy">` : '📝'}</div>
        <div class="card-body">
          <div class="card-tags">${a.tags.slice(0,3).map(t => `<span class="card-tag">#${t}</span>`).join('')}</div>
          <h3 class="card-title">${a.title}</h3>
          <p class="card-excerpt">${a.excerpt}</p>
          <div class="card-meta">
            <span class="card-date">${formatDate(a.publishedAt)}</span>
            <div style="display:flex;gap:1rem;align-items:center">
              <span class="card-views">👁 ${a.views || 0}</span>
              <a class="read-more" href="/article/${a.slug}" onclick="event.stopPropagation()">Read →</a>
            </div>
          </div>
        </div>
      </div>
    `).join('');

    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    const container = document.getElementById('pagination');
    if (totalPages <= 1) { container.innerHTML = ''; return; }
    container.innerHTML = '';
    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
      btn.textContent = i;
      btn.onclick = () => { currentPage = i; fetchArticles(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
      container.appendChild(btn);
    }
  }

  function formatDate(d) {
    if (!d) return '';
    return new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => { currentPage = 1; fetchArticles(); }, 400);
  });

  document.querySelector('[data-tag=""]').onclick = function() { setTag('', this); };

  fetchTags();
  fetchArticles();
</script>
</body>
</html>
