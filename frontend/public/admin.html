<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard — The Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1209;--paper:#faf8f3;--cream:#f2ede3;--amber:#c8832a;--muted:#8a7e6d;--border:#e0d8c8;--red:#b94040;--green:#2d6a4f;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;}

  /* Sidebar */
  .sidebar{width:240px;background:var(--ink);color:var(--paper);flex-shrink:0;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:10;}
  .sidebar-logo{padding:1.5rem;border-bottom:1px solid rgba(255,255,255,0.1);font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;}
  .sidebar-logo span{color:var(--amber);}
  .sidebar-user{padding:1rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.1);font-size:0.8rem;color:rgba(250,248,243,0.6);}
  .sidebar-user strong{display:block;color:var(--paper);margin-bottom:0.2rem;}
  nav.sidebar-nav{flex:1;padding:1rem 0;}
  nav.sidebar-nav a{display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.5rem;text-decoration:none;color:rgba(250,248,243,0.7);font-size:0.9rem;transition:all 0.2s;}
  nav.sidebar-nav a:hover,nav.sidebar-nav a.active{background:rgba(255,255,255,0.08);color:var(--paper);}
  nav.sidebar-nav a .icon{font-size:1rem;}
  .sidebar-bottom{padding:1rem 1.5rem;border-top:1px solid rgba(255,255,255,0.1);}
  .sidebar-bottom a{display:block;font-size:0.85rem;color:rgba(250,248,243,0.5);text-decoration:none;margin-bottom:0.5rem;}
  .sidebar-bottom a:hover{color:var(--paper);}
  .logout-btn{background:none;border:none;color:rgba(250,248,243,0.5);cursor:pointer;font-family:inherit;font-size:0.85rem;padding:0;}
  .logout-btn:hover{color:var(--red);}

  /* Main */
  .main{flex:1;margin-left:240px;padding:2rem;}
  .page-title{font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:0.3rem;}
  .page-sub{color:var(--muted);font-size:0.875rem;margin-bottom:2rem;}

  /* Stats */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem;}
  .stat-card{background:white;border:1.5px solid var(--border);padding:1.5rem;}
  .stat-card .label{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:0.5rem;}
  .stat-card .value{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;}
  .stat-card .icon{float:right;font-size:1.5rem;opacity:0.3;}

  /* Articles Table */
  .card{background:white;border:1.5px solid var(--border);}
  .card-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem;border-bottom:1.5px solid var(--border);}
  .card-header h3{font-family:'Playfair Display',serif;font-size:1.1rem;}
  .btn{padding:0.5rem 1rem;border:none;cursor:pointer;font-family:inherit;font-size:0.875rem;font-weight:500;text-decoration:none;display:inline-block;transition:all 0.2s;}
  .btn-primary{background:var(--ink);color:var(--paper);}
  .btn-primary:hover{background:var(--amber);}
  .btn-danger{background:none;color:var(--red);border:1.5px solid var(--red);padding:0.3rem 0.7rem;font-size:0.8rem;}
  .btn-danger:hover{background:var(--red);color:white;}
  .btn-edit{background:none;color:var(--muted);border:1.5px solid var(--border);padding:0.3rem 0.7rem;font-size:0.8rem;}
  .btn-edit:hover{border-color:var(--ink);color:var(--ink);}

  table{width:100%;border-collapse:collapse;}
  th{text-align:left;padding:0.7rem 1rem;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);border-bottom:1.5px solid var(--border);font-weight:500;}
  td{padding:0.9rem 1rem;border-bottom:1px solid var(--border);font-size:0.875rem;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--cream);}
  .article-title-cell{font-weight:500;max-width:260px;}
  .article-title-cell small{display:block;color:var(--muted);font-size:0.75rem;font-weight:400;margin-top:0.2rem;}

  .badge{display:inline-block;padding:0.2rem 0.6rem;font-size:0.7rem;border-radius:2px;text-transform:uppercase;letter-spacing:0.05em;font-weight:500;}
  .badge-published{background:#e8f5e9;color:var(--green);}
  .badge-draft{background:#fff3e0;color:#c47a00;}
  .actions{display:flex;gap:0.5rem;}

  .loading{text-align:center;padding:3rem;color:var(--muted);}
  .empty{text-align:center;padding:3rem;color:var(--muted);}

  @media(max-width:768px){
    .sidebar{display:none;}
    .main{margin-left:0;}
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">The<span>.</span>Journal</div>
  <div class="sidebar-user">
    <strong id="sidebarName">Loading…</strong>
    Admin
  </div>
  <nav class="sidebar-nav">
    <a href="/admin" class="active"><span class="icon">📊</span> Dashboard</a>
    <a href="/admin/editor"><span class="icon">✏️</span> New Article</a>
    <a href="/" target="_blank"><span class="icon">🌐</span> View Blog</a>
  </nav>
  <div class="sidebar-bottom">
    <a href="/">← Back to Blog</a>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>
</aside>

<main class="main">
  <h1 class="page-title">Dashboard</h1>
  <p class="page-sub">Welcome back! Here's what's happening with your blog.</p>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="icon">📝</div><div class="label">Total Articles</div><div class="value">—</div></div>
    <div class="stat-card"><div class="icon">🌐</div><div class="label">Published</div><div class="value">—</div></div>
    <div class="stat-card"><div class="icon">📋</div><div class="label">Drafts</div><div class="value">—</div></div>
    <div class="stat-card"><div class="icon">👁</div><div class="label">Total Views</div><div class="value">—</div></div>
  </div>

  <div class="card">
    <div class="card-header">
      <h3>All Articles</h3>
      <a href="/admin/editor" class="btn btn-primary">+ New Article</a>
    </div>
    <div id="articlesTable"><div class="loading">Loading…</div></div>
  </div>
</main>

<script>
  const token = localStorage.getItem('blog_token');
  if (!token) location.href = '/admin/login';

  const user = JSON.parse(localStorage.getItem('blog_user') || '{}');
  document.getElementById('sidebarName').textContent = user.name || 'Admin';

  function logout() { localStorage.clear(); location.href = '/admin/login'; }

  function formatDate(d) {
    return d ? new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : '—';
  }

  async function loadStats() {
    const res = await fetch('/api/articles/stats', { headers: { Authorization: `Bearer ${token}` } });
    const s = await res.json();
    const grid = document.getElementById('statsGrid');
    grid.innerHTML = `
      <div class="stat-card"><div class="icon">📝</div><div class="label">Total Articles</div><div class="value">${s.totalArticles}</div></div>
      <div class="stat-card"><div class="icon">🌐</div><div class="label">Published</div><div class="value">${s.published}</div></div>
      <div class="stat-card"><div class="icon">📋</div><div class="label">Drafts</div><div class="value">${s.drafts}</div></div>
      <div class="stat-card"><div class="icon">👁</div><div class="label">Total Views</div><div class="value">${s.totalViews.toLocaleString()}</div></div>
    `;
  }

  async function loadArticles() {
    const res = await fetch('/api/articles/all', { headers: { Authorization: `Bearer ${token}` } });
    const { articles } = await res.json();
    const container = document.getElementById('articlesTable');

    if (!articles.length) {
      container.innerHTML = '<div class="empty">No articles yet. <a href="/admin/editor">Create your first one →</a></div>';
      return;
    }

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Status</th>
            <th>Tags</th>
            <th>Views</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${articles.map(a => `
            <tr>
              <td class="article-title-cell">
                ${a.title}
                <small>${a.slug}</small>
              </td>
              <td><span class="badge badge-${a.status}">${a.status}</span></td>
              <td style="color:var(--muted);font-size:0.8rem">${a.tags.slice(0,3).join(', ') || '—'}</td>
              <td>${a.views || 0}</td>
              <td>${formatDate(a.createdAt)}</td>
              <td>
                <div class="actions">
                  <button class="btn btn-edit" onclick="editArticle('${a.id}')">Edit</button>
                  <button class="btn btn-danger" onclick="deleteArticle('${a.id}', '${a.title.replace(/'/g, "\\'")}')">Del</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  function editArticle(id) { location.href = `/admin/editor?id=${id}`; }

  async function deleteArticle(id, title) {
    if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
    const res = await fetch(`/api/articles/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
    if (res.ok) { loadStats(); loadArticles(); }
    else alert('Failed to delete article');
  }

  loadStats();
  loadArticles();
</script>
</body>
</html>
